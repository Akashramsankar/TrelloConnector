<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trello Cards</title>
  <script src="{{{appclient}}}"></script>
  <style>
    :root {
      --text: #12344d;
      --muted: #5f7386;
      --border: #d7dee7;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --surface-subtle: #f2f5f9;
      --primary: #264ac6;
      --primary-dark: #1f40ad;
      --danger: #c82124;
      --danger-soft: #fff1ef;
      --success: #0b7a5c;
      --success-soft: #edf9f3;
      --info-soft: #eef5ff;
      --shadow: 0 10px 24px rgba(18, 52, 77, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 14px;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: #f8fafc;
    }

    button {
      font: inherit;
    }

    .shell {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hero,
    .panel {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 16px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title-row h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      min-height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      background: #edf3ff;
      color: #244fa5;
      font-size: 12px;
      font-weight: 700;
    }

    .ticket-copy {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .btn {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s ease, background-color 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      border-color: #b9c7d7;
      background: #fbfcff;
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #ffffff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .message {
      display: none;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      font-size: 12px;
      line-height: 1.6;
    }

    .message.info,
    .message.success,
    .message.error {
      display: block;
    }

    .message.info {
      background: var(--info-soft);
      border-color: #bfd4ff;
      color: #1d4fa3;
    }

    .message.success {
      background: var(--success-soft);
      border-color: #a7d9bc;
      color: var(--success);
    }

    .message.error {
      background: var(--danger-soft);
      border-color: #f0c7ca;
      color: var(--danger);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 14px 10px;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
    }

    .panel-head p {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .panel-body {
      padding: 0 14px 14px;
    }

    .empty-state {
      border: 1px dashed #c7d2df;
      border-radius: 12px;
      background: var(--surface-soft);
      padding: 16px 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
      text-align: left;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-soft);
      padding: 12px;
    }

    .task-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .task-actions {
      position: relative;
      flex-shrink: 0;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease, opacity 0.2s ease;
    }

    .icon-btn:hover:not(:disabled) {
      border-color: #b9c7d7;
      background: #fbfcff;
      color: var(--text);
    }

    .icon-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .menu {
      position: absolute;
      top: 36px;
      right: 0;
      z-index: 5;
      min-width: 120px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 14px 28px rgba(18, 52, 77, 0.14);
    }

    .menu-item {
      width: 100%;
      min-height: 34px;
      padding: 0 10px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--danger);
      text-align: left;
      cursor: pointer;
      transition: background-color 0.2s ease, opacity 0.2s ease;
    }

    .menu-item:hover:not(:disabled) {
      background: var(--danger-soft);
    }

    .menu-item:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .task-link {
      display: inline-block;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 700;
    }

    .task-link:hover {
      color: var(--primary);
    }

    .task-location {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.6;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eaf0f7;
      color: #39556f;
      font-size: 11px;
      line-height: 1;
    }

    .label-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .label-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      color: #12344d;
      border: 1px solid rgba(18, 52, 77, 0.08);
    }

    .label-chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.95;
      flex: 0 0 auto;
    }

    .sync-error {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: var(--danger-soft);
      color: var(--danger);
      font-size: 11px;
      line-height: 1.6;
    }

    .helper-copy {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.6;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="title-row">
        <h2>Trello Cards</h2>
        <span id="taskCountBadge" class="count-badge">0</span>
      </div>
      <p id="ticketSummary" class="ticket-copy">Open the app to load linked Trello cards for this ticket.</p>
    </section>

    <section class="toolbar">
      <button id="createTaskBtn" type="button" class="btn btn-primary">Create Card</button>
      <button id="linkTaskBtn" type="button" class="btn">Link Card</button>
      <button id="syncNowBtn" type="button" class="btn hidden">Sync Now</button>
      <button id="refreshBtn" type="button" class="btn">Refresh</button>
    </section>

    <div id="pageMessage" class="message"></div>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h3>Linked Cards</h3>
          <p>Only connected Trello cards appear here.</p>
        </div>
      </div>
      <div class="panel-body">
        <div id="listState" class="empty-state">Open the app to check whether this ticket already has linked Trello cards.</div>
        <div id="taskList" class="task-list hidden"></div>
      </div>
    </section>

    <p id="helperCopy" class="helper-copy">Use Create Card or Link Card to connect this ticket with Trello.</p>
  </div>

  <script src="./scripts/ticket_sidebar.js"></script>
</body>
</html>
